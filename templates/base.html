<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Santuario Arcano{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="bg-veil"></div>

<header class="topbar">
  <a class="brand" href="{{ url_for('index') }}">
    <span class="brand-glyph">✦</span>
    <span class="brand-text">Santuario&nbsp;Arcano</span>
  </a>

  <nav class="topnav">
    <a href="{{ url_for('index') }}" class="{{ 'is-active' if active == 'sanctum' else '' }}">Santuario</a>
    <a href="{{ url_for('coleccion_page') }}" class="{{ 'is-active' if active == 'coleccion' else '' }}">Colección</a>
    <a href="{{ url_for('logros_page') }}" class="{{ 'is-active' if active == 'logros' else '' }}">Logros</a>
  </nav>

  <div class="nav-pack-status" id="nav-pack-status" title="Sobres disponibles">
    <div class="nav-sigils" id="nav-sigils"></div>
    <span class="nav-timer" id="nav-timer">—</span>
  </div>
</header>

<main class="page page--{{ active }}">
  {% block content %}{% endblock %}
</main>

<div class="toast-stack" id="toast-stack"></div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
